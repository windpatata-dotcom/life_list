<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命清單 | 5/1 前完成 40 個目標</title>
    <style>
        :root {
            --med-blue: #0077be;
            --soft-white: #f8f9fa;
            --sand-gold: #f4e4bc;
            --deep-ocean: #005689;
            --accent-orange: #f5a623;
            --done-green: #4caf50;
            --danger-red: #e74c3c;
            --text-dark: #333;
            --text-muted: #888;
        }

        * { box-sizing: border-box; }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--soft-white);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: linear-gradient(180deg, #e0f2ff 0%, #f8f9fa 100%);
        }

        .container {
            width: 92%;
            max-width: 600px;
            margin-top: 30px;
            margin-bottom: 30px;
            padding: 25px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 8px solid var(--med-blue);
        }

        h1 {
            color: var(--deep-ocean);
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--accent-orange);
            font-weight: bold;
            margin-bottom: 14px;
            font-size: 0.9rem;
        }

        /* 引言 */
        .quote-box {
            background: linear-gradient(135deg, #fff8e7 0%, #fef3d4 100%);
            border-left: 4px solid var(--accent-orange);
            border-radius: 0 12px 12px 0;
            margin: 0 0 18px 0;
            padding: 14px 16px;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
        }
        .quote-box p {
            margin: 0 0 6px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #5a4a1f;
            font-weight: 500;
        }
        .quote-box footer {
            font-size: 0.78rem;
            color: #a08550;
            text-align: right;
            font-style: italic;
        }

        /* 進度區 */
        .progress-box {
            background: var(--sand-gold);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 18px;
        }
        .progress-section { margin-bottom: 10px; }
        .progress-section:last-of-type { margin-bottom: 6px; }
        .progress-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: #7d6b41;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-fill.write {
            background: linear-gradient(90deg, var(--med-blue), #4ba3d8);
        }
        .progress-fill.done {
            background: linear-gradient(90deg, var(--accent-orange), var(--done-green));
        }
        .progress-fill.full {
            background: linear-gradient(90deg, var(--done-green), #81c784);
        }
        .progress-hint {
            font-size: 0.75rem;
            color: #7d6b41;
            text-align: right;
            margin-top: 6px;
            font-style: italic;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        input[type="text"], textarea {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            font-family: inherit;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: var(--med-blue);
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s, opacity 0.2s;
            font-weight: bold;
            font-family: inherit;
        }
        button:active { transform: scale(0.96); }

        #voice-btn {
            background-color: var(--sand-gold);
            color: #7d6b41;
            font-size: 1.2rem;
        }

        #add-btn {
            background-color: var(--med-blue);
            color: white;
            white-space: nowrap;
        }

        /* 雲端同步狀態 */
        .sync-status {
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 0.82rem;
            line-height: 1.55;
            word-break: break-all;
            white-space: pre-line;
            background: #f0f7ff;
            border: 1px solid #cfe3f5;
            color: var(--deep-ocean);
        }
        .sync-status.success { background: #f0fff4; border-color: #c8e6c9; color: #2e7d32; }
        .sync-status.error { background: #fff4f0; border-color: #ffd0c0; color: #c4501c; }
        .sync-status.modified { background: #fff8e7; border-color: #ffe0a0; color: #8b5a00; }

        /* 備份列 */
        .backup-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .backup-btn {
            background: #f0f7ff;
            color: var(--deep-ocean);
            font-size: 0.8rem;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #cfe3f5;
        }
        .backup-btn:hover { background: #e0f0fc; }
        .backup-btn.primary { background: var(--med-blue); color: white; border-color: var(--med-blue); }
        .backup-btn.primary:hover { background: var(--deep-ocean); }

        /* 篩選列 */
        .filter-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #eee;
            color: #555;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 20px;
        }
        .filter-btn.active {
            background: var(--deep-ocean);
            color: white;
        }

        /* 清單項目 */
        .list-item {
            display: flex;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            animation: fadeIn 0.4s ease;
            gap: 8px;
        }
        .item-number {
            background-color: var(--med-blue);
            color: white;
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .list-item.done .item-number {
            background-color: var(--done-green);
        }
        .item-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .item-text {
            font-size: 1.05rem;
            line-height: 1.4;
            word-break: break-word;
            flex: 1;
            min-width: 0;
        }
        .list-item.done .item-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .timestamp {
            font-size: 0.72rem;
            color: #999;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .journey {
            background: #f0f7ff;
            border-left: 3px solid var(--med-blue);
            padding: 8px 10px;
            margin-top: 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #555;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .list-item.done .journey {
            background: #f0fff4;
            border-left-color: var(--done-green);
        }

        /* 照片格 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 6px;
            margin-top: 8px;
        }
        .photo-thumb {
            position: relative;
            width: 100%;
            padding-top: 100%;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: #eee;
        }
        .photo-thumb img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-remove {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 22px; height: 22px;
            border-radius: 50%;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            border: none;
        }

        /* 動作按鈕 */
        .item-actions {
            display: flex;
            flex-direction: row;
            gap: 2px;
            flex-shrink: 0;
            align-items: flex-start;
            margin-top: 2px;
        }
        .icon-btn {
            background: transparent;
            font-size: 1.05rem;
            padding: 8px 10px;
            border-radius: 8px;
            line-height: 1;
            min-width: 38px;
            min-height: 38px;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:hover { background: #f0f0f0; }
        .icon-btn.done-btn { color: var(--done-green); }
        .icon-btn.edit-btn { color: var(--med-blue); }
        .icon-btn.del-btn { color: var(--danger-red); }

        /* 編輯模式 */
        .edit-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .edit-area textarea {
            min-height: 60px;
            resize: vertical;
        }
        .edit-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .edit-actions button {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .save-btn { background: var(--med-blue); color: white; }
        .cancel-btn { background: #ddd; color: #555; }
        .add-photo-btn { background: var(--sand-gold); color: #7d6b41; }

        .empty-hint {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .recording {
            animation: pulse 1.5s infinite;
            background-color: #ff6b6b !important;
            color: white !important;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Modal: 完成歷程記錄 */
        .modal-bg {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-bg.show { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 22px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .modal h3 {
            margin: 0 0 6px;
            color: var(--deep-ocean);
        }
        .modal .target-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 12px;
            word-break: break-word;
        }
        .modal label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin: 10px 0 4px;
            font-weight: bold;
        }
        .modal textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }
        .modal input[type="date"] {
            padding: 8px 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 16px;
        }
        .modal-actions .save-btn { background: var(--done-green); color: white; padding: 10px 18px; }
        .modal-actions .cancel-btn { padding: 10px 18px; }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: zoom-out;
        }
        .lightbox.show { display: flex; }
        .lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 6px;
        }
        .lightbox-close {
            position: absolute;
            top: 16px; right: 20px;
            color: white;
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
        }

        .photo-input {
            display: none;
        }
        .photo-loading {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ===== 手機版優化 ===== */
        @media (max-width: 480px) {
            .container {
                width: 100%;
                margin: 0;
                padding: 16px;
                border-radius: 0;
                border-top-width: 6px;
                box-shadow: none;
                min-height: 100vh;
            }
            h1 {
                font-size: 1.5rem;
                margin-bottom: 4px;
            }
            .subtitle { font-size: 0.8rem; margin-bottom: 12px; }

            .quote-box { padding: 12px; margin-bottom: 14px; }
            .quote-box p { font-size: 0.88rem; }
            .quote-box footer { font-size: 0.72rem; }

            .progress-box { padding: 12px; }
            .progress-row { font-size: 0.78rem; }

            .input-group { flex-wrap: wrap; gap: 6px; }
            .input-group input[type="text"] {
                flex: 1 1 100%;
                order: 1;
            }
            #voice-btn {
                flex: 0 0 auto;
                order: 2;
                min-width: 48px;
            }
            #add-btn {
                flex: 1;
                order: 3;
            }

            .sync-status { font-size: 0.78rem; padding: 8px 10px; }
            .backup-bar { justify-content: space-between; gap: 4px; }
            .backup-btn { flex: 1 1 calc(50% - 4px); padding: 10px 6px; font-size: 0.78rem; }
            .filter-btn { padding: 8px 14px; font-size: 0.85rem; }

            /* 清單項目 */
            .list-item {
                padding: 10px 0;
                gap: 6px;
            }
            .item-number {
                min-width: 26px;
                height: 26px;
                font-size: 0.8rem;
            }
            .item-text { font-size: 1rem; }
            .timestamp { font-size: 0.7rem; }

            .item-actions { gap: 0; }
            .icon-btn {
                padding: 6px 8px;
                min-width: 36px;
                min-height: 36px;
            }

            /* 照片格在手機上每排 3 張 */
            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            /* Modal 全螢幕貼齊 */
            .modal-bg { padding: 0; }
            .modal {
                border-radius: 16px 16px 0 0;
                max-height: 95vh;
                margin-top: auto;
                padding: 18px;
            }
            .modal h3 { font-size: 1.1rem; }
        }

        /* 超小螢幕（窄機型） */
        @media (max-width: 360px) {
            .progress-row { font-size: 0.72rem; }
            .item-text { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>生命清單</h1>
    <div class="subtitle">🎯 5/1 前寫滿 40 個 · 55 歲前完成一半</div>

    <blockquote class="quote-box">
        <p>「莽撞地開始，拙劣地完成，遠勝於『因為追求完美』而一動不動。」</p>
        <footer>—— 脫不花《魯莽定律》（得到 App 共同創辦人）</footer>
    </blockquote>

    <div class="progress-box">
        <div class="progress-section">
            <div class="progress-row">
                <span>📝 寫下清單</span>
                <span id="write-label">0 / 40</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill write" id="write-fill"></div>
            </div>
        </div>
        <div class="progress-section">
            <div class="progress-row">
                <span>🎯 完成清單（55 歲前一半）</span>
                <span id="done-label">0 / 20</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill done" id="done-fill"></div>
            </div>
        </div>
        <div class="progress-hint" id="progress-hint">繼續加油 🌊</div>
    </div>

    <div id="sync-status" class="sync-status" style="display:none;"></div>

    <div class="backup-bar">
        <button class="backup-btn primary" id="sync-reload-btn" title="從雲端 JSON 重新載入">🔄 雲端載入</button>
        <button class="backup-btn" id="sync-setup-btn" title="設定 Google Drive 公開連結">🔗 設定雲端</button>
        <button class="backup-btn" id="export-btn" title="匯出資料為 JSON 檔（覆蓋雲端）">📤 匯出備份</button>
        <button class="backup-btn" id="import-btn" title="從 JSON 檔還原資料">📥 匯入備份</button>
        <input type="file" id="import-input" accept="application/json,.json" style="display:none;">
    </div>

    <div class="input-group">
        <input type="text" id="task-input" placeholder="寫下想做的事..." autocomplete="off">
        <button id="voice-btn" title="語音輸入">🎤</button>
        <button id="add-btn">新增</button>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="pending">未完成</button>
        <button class="filter-btn" data-filter="done">已完成</button>
    </div>

    <div id="list-container"></div>
    <div id="empty-hint" class="empty-hint" style="display:none;">還沒有項目，從上面開始寫吧 ✍️</div>
</div>

<!-- Modal: 完成歷程 -->
<div class="modal-bg" id="modal-bg">
    <div class="modal">
        <h3>標註完成 ✅</h3>
        <div class="target-text" id="modal-target"></div>

        <label for="modal-date">完成日期</label>
        <input type="date" id="modal-date">

        <label for="modal-note">記錄歷程（這段過程的心得、感受、回憶...）</label>
        <textarea id="modal-note" placeholder="例如：和家人一起完成的，那天的天空特別藍..."></textarea>

        <label>照片紀錄</label>
        <div id="modal-photos" class="photo-grid"></div>
        <div id="modal-photo-loading" class="photo-loading" style="display:none;">處理照片中...</div>
        <input type="file" id="modal-photo-input" class="photo-input" accept="image/*" multiple>
        <button class="add-photo-btn" id="modal-add-photo" style="margin-top:8px;">📷 新增照片</button>

        <div class="modal-actions">
            <button class="cancel-btn" id="modal-cancel">取消</button>
            <button class="save-btn" id="modal-save">儲存完成</button>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img id="lightbox-img" alt="放大檢視">
</div>

<script>
'use strict';

const STORAGE_KEY = 'lifeList.v3';
const TOTAL_GOAL = 40;
const HALF_GOAL = 20;
const MAX_IMG_SIZE = 1200;
const IMG_QUALITY = 0.75;

const taskInput = document.getElementById('task-input');
const addBtn = document.getElementById('add-btn');
const voiceBtn = document.getElementById('voice-btn');
const listContainer = document.getElementById('list-container');
const emptyHint = document.getElementById('empty-hint');
const writeLabel = document.getElementById('write-label');
const doneLabel = document.getElementById('done-label');
const writeFill = document.getElementById('write-fill');
const doneFill = document.getElementById('done-fill');
const progressHint = document.getElementById('progress-hint');
const filterBtns = document.querySelectorAll('.filter-btn');
const exportBtn = document.getElementById('export-btn');
const importBtn = document.getElementById('import-btn');
const importInput = document.getElementById('import-input');
const syncStatusEl = document.getElementById('sync-status');
const syncReloadBtn = document.getElementById('sync-reload-btn');
const syncSetupBtn = document.getElementById('sync-setup-btn');

const SYNC_URL_KEY = 'lifeList.syncUrl';
const LAST_SYNC_KEY = 'lifeList.lastSyncAt';
const LAST_EDIT_KEY = 'lifeList.lastEditAt';
let cloudExportedAt = null;

const modalBg = document.getElementById('modal-bg');
const modalTarget = document.getElementById('modal-target');
const modalDate = document.getElementById('modal-date');
const modalNote = document.getElementById('modal-note');
const modalSave = document.getElementById('modal-save');
const modalCancel = document.getElementById('modal-cancel');
const modalPhotos = document.getElementById('modal-photos');
const modalPhotoInput = document.getElementById('modal-photo-input');
const modalAddPhoto = document.getElementById('modal-add-photo');
const modalPhotoLoading = document.getElementById('modal-photo-loading');

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxClose = document.getElementById('lightbox-close');

let items = [];
let currentFilter = 'all';
let activeModalId = null;
let modalDraftPhotos = [];

// ===== 工具 =====
function escapeHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
function fmtDateTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const pad = n => n.toString().padStart(2, '0');
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const pad = n => n.toString().padStart(2, '0');
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
}
function todayISO() {
    const d = new Date();
    const pad = n => n.toString().padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// 把 File 壓縮成 base64 jpeg
function compressImage(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;
                if (width > MAX_IMG_SIZE || height > MAX_IMG_SIZE) {
                    if (width > height) {
                        height = Math.round(height * MAX_IMG_SIZE / width);
                        width = MAX_IMG_SIZE;
                    } else {
                        width = Math.round(width * MAX_IMG_SIZE / height);
                        height = MAX_IMG_SIZE;
                    }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', IMG_QUALITY));
            };
            img.onerror = reject;
            img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// ===== 儲存 / 讀取 =====
function save() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        localStorage.setItem(LAST_EDIT_KEY, new Date().toISOString());
        refreshSyncStatus();
    } catch (e) {
        console.warn('儲存失敗', e);
        alert('儲存空間可能不足，請刪除一些照片再試。');
    }
}
function load() {
    // 主要儲存鍵 + 向下相容：若主鍵沒資料則嘗試讀舊版鍵，避免改版時遺失
    const FALLBACK_KEYS = ['lifeList.v2', 'lifeList.v1', 'lifeList'];
    try {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
            for (const k of FALLBACK_KEYS) {
                const r = localStorage.getItem(k);
                if (r) { raw = r; break; }
            }
        }
        if (raw) items = JSON.parse(raw) || [];
    } catch (e) { items = []; }
    // 補齊新欄位預設值，避免結構升級時舊資料缺欄位
    items.forEach(it => {
        if (it.photos === undefined) it.photos = [];
        if (it.journey === undefined) it.journey = '';
        if (it.done === undefined) it.done = false;
        if (it.doneAt === undefined) it.doneAt = null;
    });
    // 第一次讀到舊資料就立刻寫入主鍵，之後就以主鍵為準
    if (items.length > 0) save();
}

// ===== 渲染 =====
function render() {
    listContainer.innerHTML = '';

    const filtered = items.filter(it => {
        if (currentFilter === 'pending') return !it.done;
        if (currentFilter === 'done') return it.done;
        return true;
    });

    if (filtered.length === 0) {
        emptyHint.style.display = 'block';
        emptyHint.textContent = items.length === 0
            ? '還沒有項目，從上面開始寫吧 ✍️'
            : '這個分類目前沒有項目';
    } else {
        emptyHint.style.display = 'none';
    }

    filtered
        .slice()
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .forEach(it => listContainer.appendChild(renderItem(it)));

    updateProgress();
}

function renderItem(it) {
    const sorted = items.slice().sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    const seq = sorted.findIndex(x => x.id === it.id) + 1;

    const wrap = document.createElement('div');
    wrap.className = 'list-item' + (it.done ? ' done' : '');
    wrap.dataset.id = it.id;

    let journeyHtml = '';
    if (it.done && (it.journey || it.doneAt)) {
        const dateStr = it.doneAt ? `✓ 完成於 ${fmtDate(it.doneAt)}` : '';
        const journeyText = it.journey ? `\n${it.journey}` : '';
        journeyHtml = `<div class="journey">${escapeHtml(dateStr + journeyText)}</div>`;
    }

    let photosHtml = '';
    if (it.done && it.photos && it.photos.length > 0) {
        photosHtml = `<div class="photo-grid">${
            it.photos.map((p, i) => `
                <div class="photo-thumb" data-photo-idx="${i}">
                    <img src="${p}" alt="紀錄照片">
                </div>
            `).join('')
        }</div>`;
    }

    wrap.innerHTML = `
        <div class="item-number">${seq}</div>
        <div class="item-content">
            <div class="item-header">
                <span class="item-text">${escapeHtml(it.text)}</span>
                <span class="timestamp">${fmtDateTime(it.createdAt)}</span>
            </div>
            ${journeyHtml}
            ${photosHtml}
        </div>
        <div class="item-actions">
            <button class="icon-btn done-btn" title="${it.done ? '取消完成' : '標註完成'}">${it.done ? '↩️' : '✓'}</button>
            <button class="icon-btn edit-btn" title="編輯">✏️</button>
            <button class="icon-btn del-btn" title="刪除">🗑️</button>
        </div>
    `;

    wrap.querySelector('.done-btn').addEventListener('click', () => toggleDone(it.id));
    wrap.querySelector('.edit-btn').addEventListener('click', () => startEdit(it.id, wrap));
    wrap.querySelector('.del-btn').addEventListener('click', () => removeItem(it.id));

    wrap.querySelectorAll('.photo-thumb').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.photoIdx, 10);
            openLightbox(it.photos[idx]);
        });
    });

    return wrap;
}

function updateProgress() {
    const total = items.length;
    const doneCount = items.filter(x => x.done).length;
    const writePct = Math.min(100, (total / TOTAL_GOAL) * 100);
    const donePct = Math.min(100, (doneCount / HALF_GOAL) * 100);
    writeLabel.textContent = `${total} / ${TOTAL_GOAL} · ${Math.round(writePct)}%`;
    doneLabel.textContent = `${doneCount} / ${HALF_GOAL} · ${Math.round(donePct)}%`;

    writeFill.style.width = writePct + '%';
    doneFill.style.width = donePct + '%';
    writeFill.classList.toggle('full', total >= TOTAL_GOAL);
    doneFill.classList.toggle('full', doneCount >= HALF_GOAL);

    if (doneCount >= HALF_GOAL) {
        progressHint.textContent = '🎉 已完成一半目標！繼續往下一個願望前進';
    } else if (total >= TOTAL_GOAL) {
        progressHint.textContent = '✍️ 40 個願望都寫下了，開始一個一個實現吧';
    } else if (total === 0) {
        progressHint.textContent = '從第一個願望開始 🌊';
    } else {
        progressHint.textContent = `“Anything you're scared of, is an opportunity. It's, like, so exciting.”`;
    }
}

// ===== 操作 =====
function addItem() {
    const text = taskInput.value.trim();
    if (text === '') return;

    items.push({
        id: uid(),
        text,
        createdAt: new Date().toISOString(),
        done: false,
        doneAt: null,
        journey: '',
        photos: []
    });
    taskInput.value = '';
    save();
    render();

    if (items.length === TOTAL_GOAL) {
        setTimeout(() => alert('恭喜！妳已寫滿 40 個生命的願望！🎉'), 200);
    }
}

function removeItem(id) {
    const it = items.find(x => x.id === id);
    if (!it) return;
    if (!confirm(`確定要刪除「${it.text}」嗎？`)) return;
    items = items.filter(x => x.id !== id);
    save();
    render();
}

function startEdit(id, wrap) {
    const it = items.find(x => x.id === id);
    if (!it) return;

    if (it.done) {
        // 已完成的項目用 Modal 編輯（含照片管理）
        openModal(id);
        return;
    }

    // 未完成的就地編輯文字
    const content = wrap.querySelector('.item-content');
    content.innerHTML = `
        <div class="edit-area">
            <textarea class="edit-text">${escapeHtml(it.text)}</textarea>
            <div class="edit-actions">
                <button class="save-btn">儲存</button>
                <button class="cancel-btn">取消</button>
            </div>
        </div>
    `;
    const textArea = content.querySelector('.edit-text');
    textArea.focus();

    content.querySelector('.save-btn').addEventListener('click', () => {
        const newText = textArea.value.trim();
        if (newText === '') { alert('內容不能空白'); return; }
        it.text = newText;
        save();
        render();
    });
    content.querySelector('.cancel-btn').addEventListener('click', render);
}

function toggleDone(id) {
    const it = items.find(x => x.id === id);
    if (!it) return;

    if (it.done) {
        if (!confirm('要取消這項的完成標記嗎？（已記錄的歷程與照片會保留）')) return;
        it.done = false;
        it.doneAt = null;
        save();
        render();
    } else {
        openModal(id);
    }
}

// ===== Modal =====
function openModal(id) {
    const it = items.find(x => x.id === id);
    if (!it) return;
    activeModalId = id;
    modalTarget.textContent = `項目：${it.text}`;
    modalDate.value = it.doneAt ? it.doneAt.slice(0, 10) : todayISO();
    modalNote.value = it.journey || '';
    modalDraftPhotos = [...(it.photos || [])];
    renderModalPhotos();
    modalBg.classList.add('show');
    setTimeout(() => modalNote.focus(), 100);
}

function renderModalPhotos() {
    if (modalDraftPhotos.length === 0) {
        modalPhotos.innerHTML = '';
        return;
    }
    modalPhotos.innerHTML = modalDraftPhotos.map((p, i) => `
        <div class="photo-thumb" data-idx="${i}">
            <img src="${p}" alt="預覽">
            <button class="photo-remove" data-remove="${i}" title="移除">✕</button>
        </div>
    `).join('');

    modalPhotos.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const idx = parseInt(btn.dataset.remove, 10);
            modalDraftPhotos.splice(idx, 1);
            renderModalPhotos();
        });
    });
    modalPhotos.querySelectorAll('.photo-thumb').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.idx, 10);
            openLightbox(modalDraftPhotos[idx]);
        });
    });
}

modalAddPhoto.addEventListener('click', () => modalPhotoInput.click());

modalPhotoInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    modalPhotoLoading.style.display = 'block';
    modalPhotoLoading.textContent = `處理 ${files.length} 張照片中...`;

    for (const file of files) {
        try {
            const dataUrl = await compressImage(file);
            modalDraftPhotos.push(dataUrl);
        } catch (err) {
            console.warn('照片處理失敗', err);
        }
    }

    modalPhotoLoading.style.display = 'none';
    modalPhotoInput.value = '';
    renderModalPhotos();
});

modalSave.addEventListener('click', () => {
    if (!activeModalId) return;
    const it = items.find(x => x.id === activeModalId);
    if (!it) return;
    const wasDone = it.done;
    it.done = true;
    it.doneAt = modalDate.value
        ? new Date(modalDate.value + 'T00:00:00').toISOString()
        : new Date().toISOString();
    it.journey = modalNote.value.trim();
    it.photos = [...modalDraftPhotos];
    activeModalId = null;
    modalDraftPhotos = [];
    modalBg.classList.remove('show');
    save();
    render();

    const doneCount = items.filter(x => x.done).length;
    if (!wasDone && doneCount === HALF_GOAL) {
        setTimeout(() => alert('🎉 太棒了！妳已完成一半的生命願望！'), 200);
    }
});

modalCancel.addEventListener('click', () => {
    activeModalId = null;
    modalDraftPhotos = [];
    modalBg.classList.remove('show');
});
modalBg.addEventListener('click', (e) => {
    if (e.target === modalBg) {
        activeModalId = null;
        modalDraftPhotos = [];
        modalBg.classList.remove('show');
    }
});

// ===== Lightbox =====
function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('show');
}
lightbox.addEventListener('click', () => lightbox.classList.remove('show'));
lightboxClose.addEventListener('click', (e) => {
    e.stopPropagation();
    lightbox.classList.remove('show');
});

// ===== 篩選 =====
filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
    });
});

// ===== 新增事件 =====
addBtn.addEventListener('click', addItem);
taskInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') addItem();
});

// ===== 語音輸入 =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-TW';
    recognition.interimResults = false;
    let isRecording = false;

    voiceBtn.addEventListener('click', () => {
        if (isRecording) {
            recognition.stop();
            return;
        }
        try {
            recognition.start();
            isRecording = true;
            voiceBtn.classList.add('recording');
        } catch (e) {
            isRecording = false;
            voiceBtn.classList.remove('recording');
        }
    });

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        taskInput.value = transcript;
    };
    recognition.onspeechend = () => recognition.stop();
    recognition.onend = () => {
        isRecording = false;
        voiceBtn.classList.remove('recording');
    };
    recognition.onerror = () => {
        isRecording = false;
        voiceBtn.classList.remove('recording');
    };
} else {
    voiceBtn.style.display = 'none';
}

// ===== 匯出 / 匯入備份 =====
exportBtn.addEventListener('click', () => {
    const payload = {
        version: 'lifeList.v3',
        exportedAt: new Date().toISOString(),
        items: items
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const pad = n => n.toString().padStart(2, '0');
    const d = new Date();
    const stamp = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    a.href = url;
    a.download = `生命清單_備份_${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    if (localStorage.getItem(SYNC_URL_KEY)) {
        showSync(
            `📤 已下載備份檔，請執行：\n` +
            `1. 開啟 Google Drive，找到舊的 JSON 檔\n` +
            `2. 右鍵 →「管理版本」→ 上傳這個新檔（保留同個檔案 ID）\n` +
            `3. 在另一台裝置按「🔄 雲端載入」即可同步`,
            'modified'
        );
    }
});

importBtn.addEventListener('click', () => importInput.click());

importInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const data = JSON.parse(ev.target.result);
            const incoming = Array.isArray(data) ? data : (data.items || []);
            if (!Array.isArray(incoming)) throw new Error('格式錯誤');

            const choice = items.length === 0
                ? 'replace'
                : (confirm(`偵測到目前有 ${items.length} 筆資料。\n\n按「確定」= 合併（用 ID 比對，新檔覆蓋舊的）\n按「取消」= 完全取代（清空現有資料）`) ? 'merge' : 'replace');

            if (choice === 'replace') {
                items = incoming;
            } else {
                // 合併：以 id 為鍵，匯入的覆蓋既有的
                const map = new Map(items.map(x => [x.id, x]));
                incoming.forEach(x => {
                    if (!x.id) x.id = uid();
                    map.set(x.id, x);
                });
                items = Array.from(map.values());
            }
            // 補齊欄位
            items.forEach(it => {
                if (it.photos === undefined) it.photos = [];
                if (it.journey === undefined) it.journey = '';
                if (it.done === undefined) it.done = false;
                if (it.doneAt === undefined) it.doneAt = null;
                if (!it.id) it.id = uid();
                if (!it.createdAt) it.createdAt = new Date().toISOString();
            });
            save();
            render();
            alert(`✅ 匯入成功，目前共 ${items.length} 筆資料`);
        } catch (err) {
            alert('❌ 匯入失敗：檔案格式不正確');
            console.warn(err);
        } finally {
            importInput.value = '';
        }
    };
    reader.readAsText(file);
});

// ===== 雲端同步（Google Drive 公開連結） =====
function extractDriveFileId(url) {
    if (!url) return null;
    const s = url.trim();
    let m = s.match(/\/file\/d\/([^/?#]+)/);
    if (m) return m[1];
    m = s.match(/[?&]id=([^&]+)/);
    if (m) return m[1];
    if (/^[\w-]{20,}$/.test(s)) return s; // 直接貼 file ID
    return null;
}

function showSync(text, type) {
    syncStatusEl.style.display = 'block';
    syncStatusEl.className = 'sync-status' + (type ? ' ' + type : '');
    syncStatusEl.textContent = text;
}

function refreshSyncStatus() {
    const lastEdit = localStorage.getItem(LAST_EDIT_KEY);
    if (cloudExportedAt && lastEdit && new Date(lastEdit) > new Date(cloudExportedAt)) {
        showSync(
            `⚠️ 本地有未同步的修改（${fmtDateTime(lastEdit)}）\n` +
            `請按「📤 匯出備份」並上傳到 Google Drive 覆蓋舊檔。\n` +
            `雲端版本：${fmtDateTime(cloudExportedAt)}`,
            'modified'
        );
    }
}

async function loadFromCloud(opts) {
    opts = opts || {};
    let syncUrl = localStorage.getItem(SYNC_URL_KEY);
    if (!syncUrl) {
        if (opts.silent) return false;
        showSync('尚未設定雲端同步連結，請按「🔗 設定雲端」', '');
        return false;
    }
    const fileId = extractDriveFileId(syncUrl);
    if (!fileId) {
        showSync('⚠️ 無法解析雲端連結（請確認是 Google Drive 分享 URL）', 'error');
        return false;
    }
    showSync('⏳ 正在從雲端載入...', '');
    const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
    try {
        const res = await fetch(downloadUrl, { mode: 'cors', cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        if (text.trim().startsWith('<')) {
            throw new Error('收到 HTML 而非 JSON。請確認檔案已設為「知道連結的所有人皆可檢視」');
        }
        const data = JSON.parse(text);
        const incoming = Array.isArray(data) ? data : (data.items || []);
        if (!Array.isArray(incoming)) throw new Error('JSON 結構錯誤（找不到 items 陣列）');

        items = incoming;
        items.forEach(it => {
            if (it.photos === undefined) it.photos = [];
            if (it.journey === undefined) it.journey = '';
            if (it.done === undefined) it.done = false;
            if (it.doneAt === undefined) it.doneAt = null;
            if (!it.id) it.id = uid();
            if (!it.createdAt) it.createdAt = new Date().toISOString();
        });

        cloudExportedAt = data.exportedAt || null;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        localStorage.setItem(LAST_SYNC_KEY, new Date().toISOString());
        // 把本地編輯時間設成雲端的時間，避免立刻就顯示「未同步」
        if (cloudExportedAt) localStorage.setItem(LAST_EDIT_KEY, cloudExportedAt);

        render();
        const ts = cloudExportedAt ? fmtDateTime(cloudExportedAt) : '未知';
        const doneCnt = items.filter(x => x.done).length;
        showSync(
            `✅ 已從雲端載入｜備份時間：${ts}\n` +
            `共 ${items.length} 筆（已完成 ${doneCnt} 筆）— 確認無誤後即可繼續編輯。`,
            'success'
        );
        return true;
    } catch (err) {
        console.warn(err);
        showSync(
            `⚠️ 雲端載入失敗：${err.message}\n` +
            `可能原因：檔案非公開、連結錯誤、或 Google Drive 阻擋了 CORS 跨網域存取。\n` +
            `→ 請改用「📥 匯入備份」手動載入 Drive 下載的 JSON 檔。`,
            'error'
        );
        return false;
    }
}

syncReloadBtn.addEventListener('click', () => loadFromCloud());

syncSetupBtn.addEventListener('click', () => {
    const cur = localStorage.getItem(SYNC_URL_KEY) || '';
    const url = window.prompt(
        '請貼上 Google Drive 檔案的分享連結\n\n' +
        '步驟：\n' +
        '1. 在 Drive 對 JSON 檔點右鍵 →「共用」\n' +
        '2. 「一般存取權」改為「知道連結的所有人」→ 檢視者\n' +
        '3. 複製連結貼到下面：',
        cur
    );
    if (url === null) return;
    if (url.trim() === '') {
        localStorage.removeItem(SYNC_URL_KEY);
        showSync('已清除雲端連結設定', '');
        return;
    }
    const fid = extractDriveFileId(url);
    if (!fid) {
        alert('⚠️ 無法解析這個連結，請確認是 Google Drive 分享 URL');
        return;
    }
    localStorage.setItem(SYNC_URL_KEY, url.trim());
    loadFromCloud();
});

// ===== 啟動 =====
load();
render();
// 啟動時若已設定同步連結，自動嘗試從雲端載入
if (localStorage.getItem(SYNC_URL_KEY)) {
    loadFromCloud({ silent: false });
} else if (items.length > 0) {
    const lastEdit = localStorage.getItem(LAST_EDIT_KEY);
    if (lastEdit) {
        showSync(`💾 使用本地資料｜最近編輯：${fmtDateTime(lastEdit)}\n（按「🔗 設定雲端」啟用手機+電腦同步）`, '');
    }
}
